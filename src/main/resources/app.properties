# Database
db.url=jdbc:h2:file:./data/examprep;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.username=sa
db.password=
db.driver=org.h2.Driver

# JWT
jwt.secret=change-me-in-production-use-long-random-string
jwt.ttl.hours=24

# Opaque URL id encryption
id.cipher.secret=change-me-id-cipher-secret

# Funnel webhook / API (required to create access tokens)
funnel.api.key=change-me-funnel-api-key

# H2 console (dev only)
h2.console.enabled=true
